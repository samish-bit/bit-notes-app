<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BIT Notes - {% block title %}{% endblock %}</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
</head>
<body>

<nav>
  <a href="/" class="nav-brand">BIT Notes</a>
  <div class="nav-links">
    <a href="/">Home</a>
    <a href="/browse">Browse</a>
    {% if current_user.is_authenticated %}
      <a href="/upload">Upload</a>
      <span style="color:#aaa; margin-left:1.5rem; font-size:0.9rem;">Hi, {{ current_user.username }}</span>
      <a href="/logout" style="margin-left:1rem;">Logout</a>
    {% else %}
      <a href="/register">Register</a>
      <a href="/login">Login</a>
    {% endif %}
  </div>
</nav>

  <main>
    {% block content %}
    {% endblock %}
  </main>

  <footer>
    <p>BIT Notes — built by a Samish Pradhan</p>
  </footer>

</body>
</html>
